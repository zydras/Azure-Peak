  - rscadd: Adventurers & Wretches can use the talkstatue. Only BH members can access
      the wretch side. This does not include their agents yet
  - rscadd: When a stockpile is full but there is still regional demand, it automatically
      export 1 or more units up to the regional demand and gives the stockpiler the
      buy price, with the Crown pocketing the differences
  - rscadd: Add direct stockpile import, which disallow direct stockpile import beyond
      regional supply, it follows the price that Crown must pays instead of staying
      static during a shortage. Added clay shortage events
  - rscadd: Added Item Quality to most crafted items. Item quality is respected on
      ship fulfilliments and on standing orders now Removed the masterwork sparkles.
      I also adjusted the quality curve to guarantee Standard at Journeyman with escalating
      chance of higher quality up to Legendary at 100% masterwork which sells for
      1.5x. This is a slightly more generous curve I decided on to avoid overly inflating
      the economy while preserving niche for towners who generally start at higher
      kills, and give incentives to also take apprentice on them to start with high
      margin craft early on.
  - rscadd: Scavenged item quality to all items that is spawned on NPCs to encourage
      you to salvage or use them but not directly sell them
  - rscadd: Reworked quality and sellprices for carved gems to match material cost
      exactly at a 1.5x markup, as carving is supremely easy and highly profitable.
      I might adjust gemcarving skills upward and or consider locking it
  - rscadd: Bathhouse Agency and other Agency / Benefactorship (Church / Merchant
      / Bathhouse) is now explained properly in the draft writ. They no longer announce
      on scom and is visible otherwise. Bathhouse Agency now grant you the ability
      to squeeze through the bathhouse tunnel and get 100% instead of 50% at the smuggler
      navigator.
  - rscadd: Added the ability to toggle Parchment Theme from Parchment to Leatherbound
      in Game Settings - This is basically a customized yellow / gold on brown scheme
      that should be easier on your eyes without imitating the old RT red on matte
      black anti UX design vibe.
  - rscadd: Added per regional drinks victualling order. Most realms now demand BREWABLE
      drinks / alcohol, a small amount matching their own culture, and a large amount
      that their cultures don't produce. Naledian demands fermented crab and tea.
