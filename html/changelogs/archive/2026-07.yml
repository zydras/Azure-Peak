  Ollanius:
  - rscadd: New sprites for the Silver Warhammer, Mace, and Cudgels. The Cudgels in
      particular (chiefly familiar to the Confessors) are now designed to resemble
      classic bar maces.
  - rscadd: Sprite touchups for the Hurlbats, Urumi, and all Sling Bullet projectiles.
  - rscadd: New sprites for potentially Blacksteel- or Donator-exclusive weapons,
      depending on how we feel. Staged in the code for now.
  - rscadd: Hoses! Courtesy of Dragonfruit's hardwork. Independantly dyeable with
      two channels, and comes in two flavors; cloth and maille. These cover the feet
      and legs, instead of the groin and legs; make sure to wear some smallclothes
      as well, if you intend to rep these historically accurate garments.
  - rscadd: Aventails, also fashioned by Dragonfruit! More coverage and durability
      for bascinets at the cost of weight and field-of-view. Comes in both iron and
      steel variants.
  - rscadd: An iron bascinet!
  - rscadd: Padded mittens and chausses, fashioned by Dragonfruit!
  - rscadd: You can now wear all bedsheet variants on your belt slot, in order to
      quickly cover up your character's less-than-saintly bits in a pinch. That, or
      you could probably use it for a more form-fitting experience (while resting).
  - rscadd: Likewise, you can now wear a silk tablecloth on your head.
  - rscdel: Removes the old silk tablecloth-to-nurse veil crafting recipe, as you
      can now directly wear the tablecloth like a veil.
  - code_imp: Relocated all Baothan ritual equipment from the ritualcircles.dm to
      their appropriate .dms.
  - rscadd: Standalone greatplume helmet decorations, available either to donators
      (for free) or for triumphees (for +3 TRI). Potential clipping issues with larger
      helmets, or if used with non-metal helmets.
  - rscadd: Standalone aventails; chain mantles with gorget-type durability, but inadjustability
      and a medium AC.
  - rscadd: Glass carafes, cups, and goblets! You can craft these with glass.
  - rscadd: Silver and gold carafes!
  - rscadd: Hotrocks; an alternative to the frying pan, for those who're savvy - and
      desperate - enough with stones!
  - bugfix: All bottles now properly show their corks being undone and redone.
  - rscadd: Crafting recipes for all golden, silver, and pewter silverware that hadn't
      already been added.
  - rscadd: Legacy variants of the original Sallet, Visored Sallet, and Kettlehelm
      in both Steel and Iron! Available at the TRI shop or as Valorian recipes.
  - rscadd: Iron variants for most generic steel helmets.
  - rscadd: Missing iron equipment's been added to the generic loot equipment spawner
      tables.
